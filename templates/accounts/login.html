{% extends "base.html" %}
{% block title %}Login — SpatialLab{% endblock %}

{% block content %}
<section class="container mx-auto px-6 lg:px-16 py-14">
  <div class="max-w-md mx-auto">
    <div class="fade-in rounded-2xl border border-slate-200 dark:border-white/10 bg-white/70 dark:bg-white/5 backdrop-blur-md shadow p-6">
      <h1 class="text-2xl font-extrabold">Log in</h1>
      <p class="text-slate-600 dark:text-slate-300 mt-1">Access modules, drawings, and quizzes.</p>

      <form method="post" class="mt-6 space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}

        <button class="w-full px-4 py-3 rounded-xl bg-indigo-600 text-white font-semibold hover:bg-indigo-700 transition
                       dark:bg-cyan-400 dark:text-slate-950 dark:hover:bg-cyan-300"
                type="submit">
          Login
        </button>
      </form>

      <div class="mt-4 text-sm text-slate-600 dark:text-slate-300">
        No account? <a class="font-semibold text-indigo-700 dark:text-cyan-200 hover:underline" href="{% url 'register' %}">Create one</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
