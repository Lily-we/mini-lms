{% extends "base.html" %}
{% block title %}Choose level — {{ quiz.title }}{% endblock %}

{% block content %}
<section class="container mx-auto px-6 lg:px-16 py-12">
  <div class="max-w-2xl mx-auto">
    <div class="fade-in rounded-2xl border border-slate-200 dark:border-white/10 bg-white/70 dark:bg-white/5 backdrop-blur-md shadow p-6">
      <h1 class="text-2xl font-extrabold">{{ quiz.title }}</h1>
      {% if quiz.description %}
        <p class="text-slate-600 dark:text-slate-300 mt-1">{{ quiz.description }}</p>
      {% endif %}

      <p class="text-slate-600 dark:text-slate-300 mt-4">Choose difficulty:</p>

      <div class="mt-4 grid sm:grid-cols-3 gap-3">
        <a class="px-4 py-3 rounded-xl border border-slate-200 dark:border-white/10 bg-white/70 dark:bg-white/5 backdrop-blur-md hover:bg-white dark:hover:bg-white/10 transition text-center font-semibold"
           href="{% url 'quiz_start' quiz.id %}?level=EASY">Easy</a>

        <a class="px-4 py-3 rounded-xl border border-slate-200 dark:border-white/10 bg-white/70 dark:bg-white/5 backdrop-blur-md hover:bg-white dark:hover:bg-white/10 transition text-center font-semibold"
           href="{% url 'quiz_start' quiz.id %}?level=MEDIUM">Medium</a>

        <a class="px-4 py-3 rounded-xl bg-indigo-600 text-white font-semibold text-center hover:bg-indigo-700 transition
                  dark:bg-cyan-400 dark:text-slate-950 dark:hover:bg-cyan-300"
           href="{% url 'quiz_start' quiz.id %}?level=HARD">Hard</a>
      </div>

      <div class="mt-4">
        <a class="text-sm text-indigo-700 dark:text-cyan-200 hover:underline" href="{% url 'home' %}">← Back to home</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
